<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureCommit — Credential Scanner</title>
  <style>
    /* ── Tokens ── */
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --accent:    #f78166;
      --accent2:   #3fb950;
      --warn:      #e3b341;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --radius:    8px;
      --mono:      "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
      --sans:      "Inter", system-ui, sans-serif;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo {
      width: 34px; height: 34px;
      background: var(--accent);
      border-radius: 6px;
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .logo svg { width: 18px; height: 18px; fill: #0d1117; }
    header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: .03em; }
    header p  { font-size: .8rem; color: var(--muted); margin-top: 1px; }

    /* ── Main layout ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }
    @media (max-width: 820px) {
      main { grid-template-columns: 1fr; }
    }

    /* ── Pane shared ── */
    .pane {
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .pane + .pane { border-left: 1px solid var(--border); }
    @media (max-width: 820px) {
      .pane + .pane { border-left: none; border-top: 1px solid var(--border); }
    }

    .pane-label {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    textarea, #output {
      font-family: var(--mono);
      font-size: .82rem;
      line-height: 1.65;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      resize: vertical;
      min-height: 320px;
      width: 100%;
      outline: none;
      transition: border-color .15s;
      white-space: pre-wrap;
      word-break: break-all;
      overflow-y: auto;
    }
    textarea:focus { border-color: var(--accent); }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      cursor: pointer;
      border: none;
      border-radius: var(--radius);
      font-family: var(--sans);
      font-size: .85rem;
      font-weight: 600;
      padding: 9px 20px;
      transition: opacity .15s, transform .08s;
    }
    button:active { transform: scale(.97); }

    #btn-scan {
      background: var(--accent);
      color: #0d1117;
    }
    #btn-copy {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    #btn-clear {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    button:disabled { opacity: .45; cursor: not-allowed; }

    /* ── Findings panel ── */
    #findings-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .finding-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      animation: slideIn .2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .finding-info { flex: 1; min-width: 0; }
    .finding-name {
      font-weight: 700;
      font-size: .85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .finding-meta {
      font-size: .75rem;
      color: var(--muted);
      margin-top: 3px;
    }
    .finding-badge {
      background: rgba(247,129,102,.15);
      color: var(--accent);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: .72rem;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Summary bar ── */
    #summary {
      font-size: .82rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .status-dot.danger  { background: var(--accent); }
    .status-dot.safe    { background: var(--accent2); }

    #clean-tag {
      font-size: .72rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(63,185,80,.15);
      color: var(--accent2);
    }

    /* ── Empty state ── */
    .empty-state {
      color: var(--muted);
      font-size: .83rem;
      font-family: var(--mono);
      text-align: center;
      padding: 40px 0;
      line-height: 1.8;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent2);
      border-radius: var(--radius);
      padding: 10px 18px;
      font-size: .83rem;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .2s, transform .2s;
      pointer-events: none;
      z-index: 9999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <!-- Shield icon -->
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.35C16.5 22.15 20 17.25 20 12V6L12 2zm-1 13l-3-3 1.4-1.4 1.6 1.6 4.6-4.6L17 9l-6 6z"/>
    </svg>
  </div>
  <div>
    <h1>SecureCommit</h1>
    <p>Paste code or config — strip hardcoded credentials before they ship.</p>
  </div>
</header>

<main>
  <!-- LEFT: Input pane -->
  <section class="pane">
    <span class="pane-label">Input — paste code or config</span>

    <textarea
      id="input"
      spellcheck="false"
      placeholder="# Paste your code, .env file, config YAML, or any text here…

AWS_ACCESS_KEY_ID = 'AKIAIOSFODNN7EXAMPLE'
password = 'super_secret_pw123'
api_key = 'abc123def456ghi789jkl'
"
    ></textarea>

    <div class="controls">
      <button id="btn-scan">Scan &amp; Strip</button>
      <button id="btn-clear">Clear</button>
    </div>
  </section>

  <!-- RIGHT: Output pane -->
  <section class="pane">
    <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;">
      <span class="pane-label">Results</span>
      <div id="summary">
        <span class="status-dot" id="status-dot"></span>
        <span id="summary-text">Waiting for scan…</span>
      </div>
    </div>

    <div id="findings-wrap">
      <div class="empty-state">
        No findings yet.<br>Paste text on the left and hit <strong>Scan &amp; Strip</strong>.
      </div>
    </div>

    <span class="pane-label" id="clean-label" style="display:none">Redacted Output</span>
    <div id="output" style="display:none"></div>

    <div class="controls" id="copy-controls" style="display:none">
      <button id="btn-copy">Copy Redacted Output</button>
    </div>
  </section>
</main>

<div id="toast">Copied to clipboard!</div>

<script>
  const inputEl       = document.getElementById("input");
  const outputEl      = document.getElementById("output");
  const findingsWrap  = document.getElementById("findings-wrap");
  const summaryText   = document.getElementById("summary-text");
  const statusDot     = document.getElementById("status-dot");
  const cleanLabel    = document.getElementById("clean-label");
  const copyControls  = document.getElementById("copy-controls");
  const toast         = document.getElementById("toast");

  document.getElementById("btn-scan").addEventListener("click", runScan);
  document.getElementById("btn-clear").addEventListener("click", clearAll);
  document.getElementById("btn-copy").addEventListener("click", copyOutput);

  // Also trigger on Ctrl+Enter
  inputEl.addEventListener("keydown", e => {
    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") runScan();
  });

  async function runScan() {
    const text = inputEl.value;
    if (!text.trim()) return;

    summaryText.textContent = "Scanning…";
    statusDot.className = "status-dot";
    findingsWrap.innerHTML = "";
    outputEl.style.display = "none";
    cleanLabel.style.display = "none";
    copyControls.style.display = "none";

    try {
      const res = await fetch("/scan", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text }),
      });
      const data = await res.json();

      if (data.error) {
        summaryText.textContent = data.error;
        return;
      }

      renderFindings(data.findings, data.total_issues);
      renderOutput(data.cleaned);
    } catch (err) {
      summaryText.textContent = "Error — is the Flask server running?";
    }
  }

  function renderFindings(findings, total) {
    findingsWrap.innerHTML = "";

    if (!findings.length) {
      statusDot.className = "status-dot safe";
      summaryText.innerHTML = "No credentials detected &nbsp;<span id='clean-tag' style='font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(63,185,80,.15);color:#3fb950;'>CLEAN</span>";
      findingsWrap.innerHTML = `<div class="empty-state" style="color:#3fb950">✔ No hardcoded credentials found.<br>Looks clean!</div>`;
      return;
    }

    statusDot.className = "status-dot danger";
    summaryText.textContent = `${total} credential${total !== 1 ? "s" : ""} found across ${findings.length} pattern${findings.length !== 1 ? "s" : ""}`;

    findings.forEach(f => {
      const card = document.createElement("div");
      card.className = "finding-card";
      card.innerHTML = `
        <div class="finding-info">
          <div class="finding-name">${escHtml(f.name)}</div>
          <div class="finding-meta">Category: ${escHtml(f.category)} · Previews: ${f.samples.map(s => `<code>${escHtml(s)}</code>`).join(", ")}</div>
        </div>
        <span class="finding-badge">×${f.count}</span>
      `;
      findingsWrap.appendChild(card);
    });
  }

  function renderOutput(cleaned) {
    outputEl.textContent = cleaned;
    outputEl.style.display = "block";
    cleanLabel.style.display = "inline";
    copyControls.style.display = "flex";
  }

  function clearAll() {
    inputEl.value = "";
    findingsWrap.innerHTML = `<div class="empty-state">No findings yet.<br>Paste text on the left and hit <strong>Scan &amp; Strip</strong>.</div>`;
    outputEl.style.display = "none";
    cleanLabel.style.display = "none";
    copyControls.style.display = "none";
    summaryText.textContent = "Waiting for scan…";
    statusDot.className = "status-dot";
  }

  function copyOutput() {
    navigator.clipboard.writeText(outputEl.textContent).then(() => {
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2200);
    });
  }

  function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
</script>
</body>
</html>
